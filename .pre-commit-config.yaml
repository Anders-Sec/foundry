default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # ── Built-in file hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Secret scanning ────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── DCO sign-off check (commit-msg stage) ─────────────────────────────────
  - repo: local
    hooks:
      - id: dco-sign-off
        name: DCO sign-off
        language: script
        entry: scripts/check-dco.sh
        stages: [commit-msg]
        always_run: true

  # ── Conventional Commits (commit-msg stage) ────────────────────────────────
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        language: node
        entry: npx --no -- commitlint --edit
        stages: [commit-msg]
        always_run: true

  # ── Python — ruff (lint + format) ─────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Python — mypy ─────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: bash -c 'cd backend && uv run mypy app/'
        files: ^backend/app/.*\.py$
        pass_filenames: false

  # ── Frontend — prettier ────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        entry: npx --no -- prettier --write
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
        additional_dependencies:
          - prettier@^3.4.2

  # ── Frontend — eslint ──────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: node
        entry: bash -c 'cd frontend && npx eslint --fix'
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
        additional_dependencies: []

  # ── Dockerfile linting ────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        files: Dockerfile.*

  # ── Shell script linting ──────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: \.(sh|bash)$
